<input
  type="text"
  [formControl]="searchControl"
  placeholder="Buscar usuário..."
/>

<ul *ngIf="usuariosState$ | async as state">

  <li *ngIf="state.loading">Carregando...</li>

  <ng-container *ngIf="!state.loading">
    <li *ngFor="let user of state.data">
      {{ user.nome }}
    </li>

    <li *ngIf="state.data.length === 0">
      Nenhum resultado
    </li>
  </ng-container>

</ul>
