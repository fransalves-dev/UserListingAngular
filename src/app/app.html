<h2>Carrinho</h2>

<ul>
  @for (item of itens(); track item.id) {
    <li>
      {{ item.nome }} - {{ item.quantidade }} x {{ item.preco | currency }}

      <button (click)="removerItem(item.id)">-</button>
    </li>
  }
</ul>

<p>
  <strong>Total: {{ total() | currency }}</strong>
</p>

<button
  (click)="
    adicionarItem({
      id: 1,
      nome: 'Produto A',
      preco: 10,
      quantidade: 1,
    })
  "
>
  Adicionar Produto A
</button>
