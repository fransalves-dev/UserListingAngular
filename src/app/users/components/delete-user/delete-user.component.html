<h2 mat-dialog-title class="title">Confirmação</h2>

<mat-dialog-content>
  <p class="">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button class="cancel-button" (click)="close()">Cancelar</button>
  <button mat-button class="confirm-button" (click)="confirm()">Deletar</button>
</mat-dialog-actions>
